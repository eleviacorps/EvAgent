<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EvAgent</title>
<style>
  :root {
    --bg: #050508;
    --surface: #0a0a12;
    --border: #1a1a2e;
    --text: #d4d4e8;
    --muted: #6b6b8d;
    --accent: #4fc3f7;
    --green: #4ade80;
    --red: #ef4444;
    --amber: #fbbf24;
    --purple: #a78bfa;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    font-size: 14px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    font-size: 12px;
    min-height: 36px;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-left h1 { font-size: 14px; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
  .header-left .domain { color: var(--muted); }
  .header-left .domain span { color: var(--text); }
  .header-right { display: flex; align-items: center; gap: 16px; color: var(--muted); }
  .header-right span { display: flex; align-items: center; gap: 4px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .status-connected { background: var(--green); }
  .status-connecting { background: var(--amber); }
  .status-disconnected { background: var(--red); }

  /* Layout */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Left Panel */
  .left-panel {
    width: 220px;
    border-right: 1px solid var(--border);
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    flex-shrink: 0;
    background: var(--surface);
  }
  .left-panel .section-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .agent-list { display: flex; flex-direction: column; gap: 4px; }
  .agent-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text); }
  .agent-item .icon { font-size: 10px; }
  .agent-item.running .icon { color: var(--accent); }
  .agent-item.done .icon { color: var(--green); }
  .agent-item.failed .icon { color: var(--red); }
  .agent-item.idle .icon { color: var(--muted); }
  .info-item { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); padding: 2px 0; }
  .info-item .val { color: var(--text); }

  /* Center: Conversation */
  .center-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .msg { max-width: 85%; padding: 8px 12px; border-radius: 6px; line-height: 1.5; font-size: 13px; white-space: pre-wrap; word-wrap: break-word; }
  .msg.user { background: #1a1a2e; align-self: flex-end; border: 1px solid #2a2a4e; }
  .msg.assistant { background: #0d0d1a; align-self: flex-start; border: 1px solid #1a1a3e; }
  .msg.system { font-size: 11px; color: var(--muted); align-self: center; text-align: center; font-style: italic; max-width: 100%; border: none; background: none; padding: 4px; }

  /* Agent Card */
  .agent-card {
    align-self: flex-start;
    width: 100%;
    max-width: 100%;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: #0a0a14;
    margin: 4px 0;
  }
  .agent-card .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .agent-card .card-header .name { font-weight: 600; color: var(--accent); }
  .agent-card .card-header .status { font-size: 10px; }
  .agent-card .card-header .status.running { color: var(--accent); }
  .agent-card .card-header .status.done { color: var(--green); }
  .agent-card .card-body { padding: 6px 10px; font-size: 12px; color: var(--muted); }
  .agent-card .card-body .tool-item { display: flex; align-items: center; gap: 4px; padding: 1px 0; color: var(--text); font-size: 11px; }
  .agent-card .card-body .tool-item .icon { color: var(--amber); }
  .agent-card .progress-bar {
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    margin: 4px 0;
    overflow: hidden;
  }
  .agent-card .progress-bar .fill {
    height: 100%;
    background: var(--accent);
    border-radius: 1px;
    transition: width 0.3s;
  }

  /* Right Panel */
  .right-panel {
    width: 200px;
    border-left: 1px solid var(--border);
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    flex-shrink: 0;
    background: var(--surface);
  }
  .right-panel .section-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .tool-feed { display: flex; flex-direction: column; gap: 3px; }
  .tool-entry { font-size: 11px; color: var(--muted); padding: 2px 4px; border-left: 2px solid var(--border); }

  /* Input */
  .input-area {
    padding: 8px 16px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .input-wrap {
    display: flex;
    align-items: center;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #0d0d1a;
    padding: 8px 12px;
  }
  .input-wrap:focus-within { border-color: var(--accent); }
  .input-wrap .prompt { color: var(--green); font-weight: 700; margin-right: 8px; font-size: 14px; }
  .input-wrap input {
    flex: 1;
    border: none;
    background: transparent;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    outline: none;
  }
  .input-wrap input::placeholder { color: var(--muted); font-style: italic; }

  /* Responsive */
  @media (max-width: 800px) {
    .left-panel, .right-panel { display: none; }
    .messages { padding: 8px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>EVAGENT</h1>
    <span class="domain">● <span id="domainDisplay">general</span></span>
  </div>
  <div class="header-right">
    <span id="tokenDisplay">0 tokens</span>
    <span id="costDisplay">$0.00</span>
    <span id="runtimeDisplay">00:00</span>
    <span><span class="status-dot status-connecting" id="statusDot"></span> <span id="statusText">Connecting...</span></span>
  </div>
</div>

<div class="main">
  <!-- Left Panel -->
  <div class="left-panel">
    <div>
      <div class="section-title">Agents</div>
      <div class="agent-list" id="agentList">
        <span style="font-size:11px;color:var(--muted);font-style:italic">No agents active</span>
      </div>
    </div>
    <div>
      <div class="section-title">Info</div>
      <div class="info-item"><span>Agents</span><span class="val" id="agentCount">0/0</span></div>
      <div class="info-item"><span>Tokens</span><span class="val" id="tokenCount">0</span></div>
      <div class="info-item"><span>Domain</span><span class="val" id="domainInfo">general</span></div>
    </div>
  </div>

  <!-- Center -->
  <div class="center-panel">
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <div class="input-wrap">
        <span class="prompt">&gt;</span>
        <input type="text" id="promptInput" placeholder="Type a message..." autofocus>
      </div>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="right-panel">
    <div>
      <div class="section-title">Activity</div>
      <div class="tool-feed" id="toolFeed">
        <span style="font-size:11px;color:var(--muted);font-style:italic">No activity yet</span>
      </div>
    </div>
  </div>
</div>

<script>
// ── WebSocket Connection ──
const WS_URL = 'ws://127.0.0.1:9753/ws';
let ws = null;
let sessionStart = Date.now();
let totalTokens = 0;
let totalCost = 0;
let agents = [];
let reconnectTimer = null;

function connect() {
  setStatus('connecting', 'Connecting...');
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    setStatus('connected', 'Connected');
    addMessage('system', 'Connected to EvAgent core');
    ws.send(JSON.stringify({type: 'Ping'}));
    ws.send(JSON.stringify({type: 'AgentList'}));
  };

  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      handleMessage(msg);
    } catch(err) {
      console.error('Parse error:', err);
    }
  };

  ws.onclose = () => {
    setStatus('disconnected', 'Disconnected');
    addMessage('system', 'Connection lost. Reconnecting...');
    scheduleReconnect();
  };

  ws.onerror = () => {
    if (ws.readyState !== WebSocket.OPEN && ws.readyState !== WebSocket.CONNECTING) {
      setStatus('disconnected', 'Error');
      scheduleReconnect();
    }
  };
}

function scheduleReconnect() {
  if (reconnectTimer) clearTimeout(reconnectTimer);
  reconnectTimer = setTimeout(connect, 2000);
}

function setStatus(state, text) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = 'status-dot status-' + state;
  txt.textContent = text;
}

// ── Message Handling ──
function handleMessage(msg) {
  switch(msg.type) {
    case 'Pong':
      setStatus('connected', 'Connected');
      break;

    case 'SubAgentUpdate':
      updateAgent(msg);
      break;

    case 'DispatchResult':
      if (msg.aggregated) {
        addMessage('assistant', msg.aggregated);
      }
      if (msg.outputs && msg.outputs.length) {
        addMessage('system', 'Received ' + msg.outputs.length + ' agent output(s)');
      }
      totalTokens += msg.outputs ? msg.outputs.reduce((s, o) => s + (o.tokens_used || 0), 0) : 0;
      updateStats();
      break;

    case 'AgentList':
      if (msg.agents) {
        agents = msg.agents.map(a => a.name || JSON.stringify(a));
      }
      break;

    case 'Error':
      addMessage('system', msg.message || 'Unknown error');
      break;
  }
}

function updateAgent(data) {
  const idx = agents.findIndex(a => a.task_id === data.task_id);
  const status = data.status || 'running';
  const name = data.agent_name;
  const progress = data.progress || '';
  const tokens = data.tokens_used || 0;

  if (idx >= 0) {
    agents[idx] = {...agents[idx], status, progress, tokens};
  } else {
    agents.push({task_id: data.task_id, agent_name: name, status, progress, tokens_used: tokens, tools_used: []});
  }

  if (status === 'Completed') {
    addMessage('agent', {name, content: progress, tokens});
  } else if (status === 'Failed') {
    addMessage('system', '❌ Agent **' + name + '** failed: ' + progress);
  }

  renderAgents();
  updateStats();
}

// ── UI Rendering ──
function addMessage(role, content) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');

  if (role === 'agent') {
    div.className = 'agent-card';
    div.innerHTML = `
      <div class="card-header">
        <span class="name">▶ ${content.name}</span>
        <span class="status done">● done</span>
      </div>
      <div class="card-body">
        <div>${content.content || 'Task completed'}</div>
        <div class="progress-bar"><div class="fill" style="width:100%"></div></div>
        ${content.tokens ? `<div style="color:var(--muted);font-size:10px;margin-top:2px">${content.tokens} tokens</div>` : ''}
      </div>`;
  } else {
    div.className = 'msg ' + role;
    div.textContent = typeof content === 'string' ? content : JSON.stringify(content);
  }

  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function renderAgents() {
  const el = document.getElementById('agentList');
  const active = agents.filter(a => a.status === 'running' || a.status === 'Completed' || a.status === 'Failed');

  if (!active.length) {
    el.innerHTML = '<span style="font-size:11px;color:var(--muted);font-style:italic">No agents active</span>';
    return;
  }

  el.innerHTML = active.map(a => {
    const cls = a.status === 'running' ? 'running' : a.status === 'Completed' ? 'done' : 'failed';
    const icon = a.status === 'running' ? '▶' : a.status === 'Completed' ? '✓' : '✗';
    return `<div class="agent-item ${cls}"><span class="icon">${icon}</span> ${a.agent_name}</div>`;
  }).join('');
}

function updateStats() {
  const comp = agents.filter(a => a.status === 'Completed').length;
  const total = agents.length;
  document.getElementById('agentCount').textContent = comp + '/' + total;
  document.getElementById('tokenCount').textContent = totalTokens;
  const secs = Math.floor((Date.now() - sessionStart) / 1000);
  document.getElementById('runtimeDisplay').textContent =
    String(Math.floor(secs / 60)).padStart(2,'0') + ':' + String(secs % 60).padStart(2,'0');
  document.getElementById('tokenDisplay').textContent = formatTokens(totalTokens) + ' tokens';
  document.getElementById('costDisplay').textContent = '$' + totalCost.toFixed(2);
}

function formatTokens(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(1) + 'K';
  return String(n);
}

// ── Input ──
document.getElementById('promptInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const input = e.target;
    const text = input.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

    addMessage('user', text);
    ws.send(JSON.stringify({
      type: 'DispatchTask',
      goal: text,
      context: null,
      domain: 'general'
    }));

    input.value = '';
  }
});

// ── Init ──
connect();
updateStats();
setInterval(updateStats, 1000);
</script>
</body>
</html>
