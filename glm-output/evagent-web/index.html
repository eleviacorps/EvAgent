<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EvAgent — Web GUI</title>
<style>
  /* ============= OpenCode dark theme per spec/03-web-gui.md ============= */
  :root {
    --bg:        #050508;
    --surface-1: #0a0a12;
    --surface-2: #0d0d1a;
    --border:    #1a1a2e;
    --border-2:  #2a2a4e;
    --text:      #d4d4e8;
    --muted:     #6b6b8d;
    --accent:    #4fc3f7;
    --success:   #4ade80;
    --error:     #ef4444;
    --warning:   #fbbf24;
    --font:      'JetBrains Mono', 'Fira Code', ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.5;
    overflow: hidden;
  }
  button { font-family: var(--font); cursor: pointer; }
  input, textarea { font-family: var(--font); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* ============= Layout ============= */
  #app {
    display: grid;
    grid-template-rows: 44px 1fr 56px;
    grid-template-columns: 220px 1fr 200px;
    grid-template-areas:
      "header  header  header"
      "left    main    right"
      "input   input   input";
    height: 100vh;
    gap: 0;
  }
  #header    { grid-area: header; }
  #left      { grid-area: left; }
  #main      { grid-area: main; }
  #right     { grid-area: right; }
  #input-bar { grid-area: input; }

  /* ============= Header ============= */
  #header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px;
    background: var(--surface-1);
    border-bottom: 1px solid var(--border);
  }
  .brand {
    display: flex; align-items: center; gap: 12px;
    font-weight: 700; letter-spacing: 0.5px;
  }
  .brand .logo { color: var(--accent); font-size: 16px; }
  .brand .domain {
    color: var(--muted); font-weight: 400;
    font-size: 12px; padding: 2px 8px;
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 4px;
  }
  .meta {
    display: flex; align-items: center; gap: 16px;
    font-size: 12px; color: var(--muted);
  }
  .meta .pill { display: flex; align-items: center; gap: 6px; }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--error);
    box-shadow: 0 0 6px var(--error);
    transition: background 0.2s, box-shadow 0.2s;
  }
  .dot.connecting { background: var(--warning); box-shadow: 0 0 6px var(--warning); }
  .dot.connected  { background: var(--success); box-shadow: 0 0 6px var(--success); }

  /* ============= Left panel ============= */
  #left {
    background: var(--surface-1);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px;
  }
  .panel-h {
    font-size: 11px; text-transform: uppercase;
    color: var(--accent); font-weight: 700;
    letter-spacing: 1px; margin: 8px 0 8px 4px;
  }
  .agent-row {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 8px; border-radius: 4px;
    font-size: 12px;
  }
  .agent-row:hover { background: var(--surface-2); }
  .agent-row .icon { width: 14px; text-align: center; font-size: 12px; }
  .agent-row .icon.running   { color: var(--accent); }
  .agent-row .icon.completed { color: var(--success); }
  .agent-row .icon.failed    { color: var(--error); }
  .agent-row .name { color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .agent-row .tok  { color: var(--muted); font-size: 10px; }
  .info-block {
    margin-top: 16px; padding: 10px;
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 6px;
  }
  .info-block .row { display: flex; justify-content: space-between; font-size: 11px; padding: 2px 0; }
  .info-block .row .k { color: var(--muted); }
  .info-block .row .v { color: var(--text); font-weight: 600; }

  /* ============= Conversation ============= */
  #main {
    overflow-y: auto;
    padding: 16px 20px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .msg { max-width: 85%; padding: 10px 14px; border-radius: 6px; word-wrap: break-word; }
  .msg.user {
    align-self: flex-end;
    background: var(--border);
    border: 1px solid var(--border-2);
  }
  .msg.assistant {
    align-self: flex-start;
    background: var(--surface-2);
    border: 1px solid #1a1a3e;
  }
  .msg.assistant pre {
    background: var(--bg); padding: 8px 10px;
    border-radius: 4px; overflow-x: auto;
    border: 1px solid var(--border);
    font-size: 12px;
  }
  .msg.system {
    align-self: center; color: var(--muted);
    font-style: italic; background: transparent;
    border: none; padding: 4px 8px; font-size: 12px;
  }
  .msg .role {
    font-size: 10px; text-transform: uppercase;
    letter-spacing: 1px; color: var(--muted);
    margin-bottom: 4px;
  }
  .msg.user .role      { color: var(--accent); }
  .msg.assistant .role { color: var(--success); }

  /* Agent card (full width) */
  .agent-card {
    align-self: stretch;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .agent-card .ac-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px;
    background: var(--surface-1);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .agent-card .ac-head .name {
    color: var(--accent); font-weight: 600;
    display: flex; align-items: center; gap: 8px;
  }
  .agent-card .ac-head .name .arrow { color: var(--muted); }
  .agent-card .ac-head .status {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--muted);
  }
  .agent-card .ac-body { padding: 10px 12px; font-size: 12px; }
  .agent-card .progress-text { color: var(--text); margin-bottom: 6px; }
  .agent-card .progress-bar {
    height: 2px; background: var(--border);
    border-radius: 1px; overflow: hidden;
    margin: 6px 0 8px;
  }
  .agent-card .progress-bar > div {
    height: 100%; background: var(--accent);
    transition: width 0.3s ease;
    width: 0%;
  }
  .agent-card .tools { color: var(--muted); font-size: 11px; }
  .agent-card .tools span { color: var(--accent); }
  .agent-card .diff {
    margin-top: 6px; color: var(--muted); font-size: 11px;
  }
  .agent-card .diff .add { color: var(--success); }
  .agent-card .diff .del { color: var(--error); }
  .agent-card .ac-body pre {
    background: var(--bg); padding: 8px 10px;
    border-radius: 4px; overflow-x: auto;
    border: 1px solid var(--border);
    font-size: 11px; margin: 6px 0 0;
    max-height: 200px; overflow-y: auto;
  }

  /* ============= Right panel ============= */
  #right {
    background: var(--surface-1);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px;
  }
  .feed-item {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 6px 8px; border-radius: 4px;
    font-size: 11px;
    border-left: 2px solid var(--border);
    margin-bottom: 4px;
  }
  .feed-item .icon { color: var(--accent); flex-shrink: 0; }
  .feed-item .body { flex: 1; overflow: hidden; }
  .feed-item .body .name { color: var(--text); }
  .feed-item .body .target { color: var(--muted); display: block; font-size: 10px; }
  .feed-item .body .ts { color: var(--muted); font-size: 10px; display: block; }

  /* ============= Input bar ============= */
  #input-bar {
    background: var(--surface-1);
    border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
    padding: 0 16px;
  }
  #input-wrap {
    flex: 1; display: flex; align-items: center;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0 12px;
    height: 36px;
  }
  #input-wrap:focus-within { border-color: var(--accent); }
  #input-wrap .prompt { color: var(--success); font-weight: 700; margin-right: 8px; }
  #msg-input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text); font-size: 14px;
  }
  #msg-input::placeholder { color: var(--muted); font-style: italic; }
  #send-btn {
    background: var(--accent); color: var(--bg);
    border: none; border-radius: 6px;
    padding: 8px 16px; font-weight: 600; font-size: 12px;
  }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .empty-state {
    color: var(--muted); font-style: italic;
    text-align: center; margin: auto;
    font-size: 13px;
  }

  /* ============= Responsive ============= */
  @media (max-width: 800px) {
    #app {
      grid-template-columns: 1fr;
      grid-template-areas:
        "header"
        "main"
        "input";
    }
    #left, #right { display: none; }
  }
</style>
</head>
<body>
<div id="app">
  <!-- ============= Header ============= -->
  <div id="header">
    <div class="brand">
      <span class="logo">◆</span>
      <span>EVAGENT</span>
      <span class="domain" id="domain-chip">general</span>
    </div>
    <div class="meta">
      <div class="pill"><span>tokens</span><span id="tokens" style="color:var(--text)">0</span></div>
      <div class="pill"><span>cost</span><span id="cost" style="color:var(--text)">$0.00</span></div>
      <div class="pill"><span id="conn-text">disconnected</span><span class="dot" id="conn-dot"></span></div>
    </div>
  </div>

  <!-- ============= Left panel ============= -->
  <div id="left">
    <div class="panel-h">Agents</div>
    <div id="agents-list">
      <div class="agent-row" style="color: var(--muted); font-style: italic;">None</div>
    </div>
    <div class="info-block">
      <div class="row"><span class="k">agents</span><span class="v" id="info-agents">0</span></div>
      <div class="row"><span class="k">tokens</span><span class="v" id="info-tokens">0</span></div>
      <div class="row"><span class="k">domain</span><span class="v" id="info-domain">general</span></div>
      <div class="row"><span class="k">runtime</span><span class="v" id="info-runtime">0s</span></div>
    </div>
  </div>

  <!-- ============= Conversation ============= -->
  <div id="main">
    <div class="empty-state">Type a message to start.</div>
  </div>

  <!-- ============= Right panel ============= -->
  <div id="right">
    <div class="panel-h">Activity</div>
    <div id="activity-feed">
      <div class="feed-item" style="color: var(--muted); font-style: italic; border-left-color: transparent;">
        <div class="body"><span class="name">No activity yet</span></div>
      </div>
    </div>
  </div>

  <!-- ============= Input ============= -->
  <div id="input-bar">
    <div id="input-wrap">
      <span class="prompt">&gt;</span>
      <input id="msg-input" type="text" placeholder="Type a message..." autocomplete="off" />
    </div>
    <button id="send-btn" disabled>Send</button>
  </div>
</div>

<script>
  // ============= WebSocket client =============
  // Auto-connect with 2s backoff per spec
  const WS_URL = (() => {
    const loc = window.location;
    // Allow ?port=XXXX for testing; default to spec port 9753
    const port = new URLSearchParams(loc.search).get('port') || '9753';
    return `ws://127.0.0.1:${port}/ws`;
  })();

  let ws = null;
  let connected = false;
  let reconnectDelay = 2000;
  let totalTokens = 0;
  let runtimeStart = null;
  let pendingCards = {}; // task_id → { cardEl, barEl, bodyEl }

  const $ = (id) => document.getElementById(id);
  const main = $('main');
  const agentsList = $('agents-list');
  const activityFeed = $('activity-feed');
  const connDot = $('conn-dot');
  const connText = $('conn-text');
  const sendBtn = $('send-btn');
  const msgInput = $('msg-input');

  function setConn(state) {
    connected = state === 'connected';
    connDot.className = 'dot ' + (state === 'connected' ? 'connected' : state === 'connecting' ? 'connecting' : '');
    connText.textContent = state;
    sendBtn.disabled = !connected;
  }

  function connect() {
    setConn('connecting');
    console.log('[ws] connecting to', WS_URL);
    ws = new WebSocket(WS_URL);

    ws.onopen = () => {
      setConn('connected');
      reconnectDelay = 2000;
      if (!runtimeStart) runtimeStart = Date.now();
      addSystem('Connected to EvAgent core');
    };

    ws.onclose = () => {
      setConn('disconnected');
      addSystem('Disconnected — retrying in ' + (reconnectDelay / 1000) + 's');
      setTimeout(connect, reconnectDelay);
      reconnectDelay = Math.min(reconnectDelay * 1.5, 10000);
    };

    ws.onerror = (e) => {
      console.error('[ws] error', e);
    };

    ws.onmessage = (ev) => {
      let msg;
      try { msg = JSON.parse(ev.data); } catch (e) { return; }
      handleMessage(msg);
    };
  }

  // ============= Message handling =============
  function handleMessage(msg) {
    switch (msg.type) {
      case 'Pong':
        // heartbeat ack — nothing to render
        break;

      case 'SubAgentUpdate':
        handleSubAgentUpdate(msg);
        break;

      case 'DispatchResult':
        handleDispatchResult(msg);
        break;

      case 'Error':
        addSystem('⚠ ' + msg.message);
        break;

      default:
        console.warn('[ws] unknown message', msg);
    }
  }

  function handleSubAgentUpdate(msg) {
    const { task_id, agent_name, status, progress, tokens_used } = msg;

    // Update left-panel agents list
    updateAgentList(agent_name, status, tokens_used);

    // Update activity feed
    addActivity(
      status === 'Running' ? '⟳' : status === 'Completed' ? '✓' : '✗',
      `${agent_name} — ${progress}`,
      `task ${task_id.slice(0, 8)}`
    );

    // Update or create agent card
    if (status === 'Running') {
      if (!pendingCards[task_id]) {
        const card = createAgentCard(agent_name, task_id);
        pendingCards[task_id] = card;
        main.appendChild(card.el);
        scrollMain();
      }
      updateAgentCard(pendingCards[task_id], { status: 'running', progress, tokens: tokens_used });
    } else if (status === 'Completed') {
      const card = pendingCards[task_id];
      if (card) {
        updateAgentCard(card, { status: 'completed', progress, tokens: tokens_used });
      }
      totalTokens += tokens_used;
      $('tokens').textContent = totalTokens.toLocaleString();
      $('info-tokens').textContent = totalTokens.toLocaleString();
    } else if (status === 'Failed') {
      const card = pendingCards[task_id];
      if (card) updateAgentCard(card, { status: 'failed', progress, tokens: tokens_used });
    }
  }

  function handleDispatchResult(msg) {
    const { session_id, outputs, aggregated } = msg;
    addAssistant(aggregated, session_id);

    // Refresh runtime
    if (runtimeStart) {
      const secs = Math.floor((Date.now() - runtimeStart) / 1000);
      $('info-runtime').textContent = secs + 's';
    }
    // Estimate cost at $0.001 per 1k tokens (purely cosmetic)
    const cost = (totalTokens / 1000) * 0.001;
    $('cost').textContent = '$' + cost.toFixed(4);
  }

  // ============= DOM helpers =============
  function addUser(text) {
    clearEmptyState();
    const div = document.createElement('div');
    div.className = 'msg user';
    div.innerHTML = `<div class="role">you</div>${escapeHtml(text)}`;
    main.appendChild(div);
    scrollMain();
  }

  function addAssistant(text, sessionId) {
    const div = document.createElement('div');
    div.className = 'msg assistant';
    div.innerHTML = `<div class="role">assistant · ${sessionId ? sessionId.slice(0, 8) : ''}</div>${renderMarkdownLite(text)}`;
    main.appendChild(div);
    scrollMain();
  }

  function addSystem(text) {
    const div = document.createElement('div');
    div.className = 'msg system';
    div.textContent = text;
    main.appendChild(div);
    scrollMain();
  }

  function clearEmptyState() {
    const empty = main.querySelector('.empty-state');
    if (empty) empty.remove();
  }

  function createAgentCard(name, taskId) {
    const el = document.createElement('div');
    el.className = 'agent-card';
    el.innerHTML = `
      <div class="ac-head">
        <div class="name"><span class="arrow">▶</span>${escapeHtml(name)}</div>
        <div class="status"><span class="dot connecting" style="width:6px;height:6px"></span> running</div>
      </div>
      <div class="ac-body">
        <div class="progress-text">starting…</div>
        <div class="progress-bar"><div style="width:5%"></div></div>
        <div class="tools">Tools: <span>—</span></div>
        <pre style="display:none"></pre>
      </div>
    `;
    return {
      el,
      head: el.querySelector('.ac-head .status'),
      bar: el.querySelector('.progress-bar > div'),
      progressText: el.querySelector('.progress-text'),
      tools: el.querySelector('.tools span'),
      pre: el.querySelector('pre'),
    };
  }

  function updateAgentCard(card, { status, progress, tokens }) {
    card.progressText.textContent = `${progress} · ${tokens} tok`;
    const pct = status === 'completed' ? 100 : status === 'failed' ? 100 : Math.min(95, (parseInt(card.bar.style.width) || 5) + 25);
    card.bar.style.width = pct + '%';
    if (status === 'completed') {
      card.bar.style.background = 'var(--success)';
      card.head.innerHTML = `<span class="dot connected" style="width:6px;height:6px"></span> done`;
    } else if (status === 'failed') {
      card.bar.style.background = 'var(--error)';
      card.head.innerHTML = `<span class="dot" style="width:6px;height:6px;background:var(--error)"></span> failed`;
    }
  }

  function updateAgentList(name, status, tokens) {
    const existing = agentsList.querySelector(`[data-agent="${name}"]`);
    const icon = status === 'Running' ? '▶' : status === 'Completed' ? '✓' : '✗';
    const cls = status === 'Running' ? 'running' : status === 'Completed' ? 'completed' : 'failed';

    if (existing) {
      existing.querySelector('.icon').textContent = icon;
      existing.querySelector('.icon').className = 'icon ' + cls;
      existing.querySelector('.tok').textContent = tokens ? `${tokens}t` : '';
    } else {
      agentsList.innerHTML = ''; // clear "None"
      const row = document.createElement('div');
      row.className = 'agent-row';
      row.dataset.agent = name;
      row.innerHTML = `<span class="icon ${cls}">${icon}</span><span class="name">${escapeHtml(name)}</span><span class="tok">${tokens || 0}t</span>`;
      agentsList.appendChild(row);
    }
    const count = agentsList.querySelectorAll('.agent-row').length;
    $('info-agents').textContent = count;
  }

  function addActivity(icon, name, target) {
    const empty = activityFeed.querySelector('.feed-item[style*="transparent"]');
    if (empty) empty.remove();
    const div = document.createElement('div');
    div.className = 'feed-item';
    const ts = new Date().toLocaleTimeString();
    div.innerHTML = `<span class="icon">${icon}</span><div class="body"><span class="name">${escapeHtml(name)}</span><span class="target">${escapeHtml(target)}</span><span class="ts">${ts}</span></div>`;
    activityFeed.prepend(div);
    // Keep last 30 items
    while (activityFeed.children.length > 30) activityFeed.lastChild.remove();
  }

  function scrollMain() {
    requestAnimationFrame(() => { main.scrollTop = main.scrollHeight; });
  }

  // ============= Sending =============
  function sendGoal() {
    const text = msgInput.value.trim();
    if (!text || !connected) return;
    addUser(text);
    const payload = { type: 'DispatchTask', goal: text, context: null, domain: 'general' };
    ws.send(JSON.stringify(payload));
    msgInput.value = '';
    // Reset agent list for fresh dispatch
    agentsList.innerHTML = '<div class="agent-row" style="color: var(--muted); font-style: italic;">dispatching…</div>';
    pendingCards = {};
  }

  sendBtn.addEventListener('click', sendGoal);
  msgInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendGoal();
    }
  });

  // Heartbeat
  setInterval(() => {
    if (connected && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'Ping' }));
    }
  }, 30000);

  // Runtime ticker
  setInterval(() => {
    if (runtimeStart) {
      const secs = Math.floor((Date.now() - runtimeStart) / 1000);
      $('info-runtime').textContent = secs + 's';
    }
  }, 1000);

  // ============= Utilities =============
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  // Very small markdown subset: ## headings, ``` code blocks, **bold**, lists.
  function renderMarkdownLite(text) {
    const parts = [];
    let i = 0;
    const lines = text.split('\n');
    let inCode = false;
    let codeBuf = [];
    for (const line of lines) {
      if (line.trim().startsWith('```')) {
        if (inCode) {
          parts.push(`<pre>${escapeHtml(codeBuf.join('\n'))}</pre>`);
          codeBuf = [];
          inCode = false;
        } else {
          inCode = true;
        }
        continue;
      }
      if (inCode) { codeBuf.push(line); continue; }
      let l = escapeHtml(line);
      if (l.startsWith('### ')) l = `<div style="color:var(--accent);font-weight:600;margin-top:8px">${l.slice(4)}</div>`;
      else if (l.startsWith('## ')) l = `<div style="color:var(--accent);font-weight:700;margin-top:10px;font-size:13px">${l.slice(3)}</div>`;
      else if (l.startsWith('# '))  l = `<div style="color:var(--accent);font-weight:700;margin-top:12px;font-size:14px">${l.slice(2)}</div>`;
      else if (/^\d+\.\s/.test(l))   l = `<div style="padding-left:12px">${l}</div>`;
      else if (l.startsWith('- '))   l = `<div style="padding-left:12px">• ${l.slice(2)}</div>`;
      else if (l.trim() === '---')  l = `<hr style="border:none;border-top:1px solid var(--border);margin:8px 0"/>`;
      else                            l = `<div>${l || '&nbsp;'}</div>`;
      parts.push(l);
    }
    if (codeBuf.length) parts.push(`<pre>${escapeHtml(codeBuf.join('\n'))}</pre>`);
    return parts.join('');
  }

  // ============= Boot =============
  connect();
