# EvAgent top-level configuration
# Loaded by evagent-core at startup via serde_yaml.

core:
  max_concurrent_agents: 5
  default_timeout_secs: 120

store:
  db_path: "hermes.db"
  session_ttl_days: 30
  archive_after_days: 7

dispatch:
  max_concurrent: 5
  default_token_budget: 4096

security:
  default_network_access: false

server:
  host: "127.0.0.1"
  port: 9753

routing:
  min_confidence: 0.6

llm:
  # Mock provider returns canned responses (no API key needed).
  # Switch to "openai-compatible" to use the real provider below.
  provider: "mock"
  base_url: "https://opencode-ai/zen/v1"
  model: "deepseek-v4-flash-free"
  max_tokens: 4096
  temperature: 0.7
