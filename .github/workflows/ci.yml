# ──────────────────────────────────────────────────────────────────────────────
# HERMES CI Pipeline — GitHub Actions
# Runs on push/PR to main/master + daily schedule
# ──────────────────────────────────────────────────────────────────────────────
name: HERMES CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 6 * * *"  # Daily 06:00 UTC

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  validate:
    name: "Validation & Linting"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Validate Agent YAML files
        run: python scripts/validate_agents.py

      - name: Validate Skill SKILL.md files
        run: python scripts/validate_skills.py

      - name: Check file line limits (500 max)
        run: python scripts/check_line_limits.py

      - name: Security audit
        run: python scripts/security_audit.py
        continue-on-error: true  # Report but don't gate on audit findings

  rust_tests:
    name: "Rust Core Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: evagent-core
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            evagent-core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('evagent-core/Cargo.lock') }}

      - name: Run cargo check
        run: cargo check --workspace

      - name: Run cargo test
        run: cargo test --workspace

      - name: Check for upcoming deprecations (clippy)
        run: cargo clippy -- -D warnings
        continue-on-error: true

  tui_build:
    name: "TUI Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tui
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build TUI
        run: npm run build

  coverage:
    name: "Coverage Gate"
    runs-on: ubuntu-latest
    needs: [rust_tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run coverage gate
        run: python scripts/coverage_gate.py

      - name: Summary
        run: |
          echo "════════════════════════════════════════"
          echo "  Coverage check complete"
          echo "════════════════════════════════════════"

  all-passed:
    name: "All Checks Passed"
    if: always()
    needs: [validate, rust_tests, tui_build, coverage]
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "════════════════════════════════════════"
          echo "  HERMES CI Pipeline Complete"
          echo "════════════════════════════════════════"
          echo "  Validate:    ${{ needs.validate.result }}"
          echo "  Rust Tests:  ${{ needs.rust_tests.result }}"
          echo "  TUI Build:   ${{ needs.tui_build.result }}"
          echo "  Coverage:    ${{ needs.coverage.result }}"
          echo "════════════════════════════════════════"
      - if: >
          needs.validate.result != 'success' ||
          needs.rust_tests.result != 'success' ||
          (needs.tui_build.result != 'success' && needs.tui_build.result != 'skipped') ||
          needs.coverage.result != 'success'
        run: |
          echo "❌ Some CI checks failed."
          exit 1
      - if: success()
        run: echo "✅ All CI checks passed!"
